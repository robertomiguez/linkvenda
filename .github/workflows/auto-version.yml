name: Auto Version Bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/package.json"
      - ".github/workflows/auto-version.yml"

permissions:
  contents: write

# Prevent multiple version-bump actions from running concurrently
concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        run: |
          npm version patch --no-git-tag-version

      - name: Sync Sub-packages
        run: node scripts/sync-versions.js

      - name: Commit and Push
        run: |
          git add .
          VERSION=$(node -p "require('./package.json').version")
          git commit -m "chore: bump version to $VERSION [skip ci]"

          # Retry loop to handle concurrent pushes
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase --no-reapply-cherry-picks origin/main && \
            git push origin HEAD:main --tags && break || {
              echo "Push attempt $i failed, retrying in 5s..."
              sleep 5
            }
          done
