  <g stroke="url(#link)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Elo superior -->
    <path d="M20 24l-2.5-2.5a5 5 0 0 1 0-7.07l2.12-2.12a5 5 0 0 1 7.07 0L29.2 14.8"/>
    <!-- Elo inferior -->
    <path d="M28 24l2.5 2.5a5 5 0 0 1 0 7.07l-2.12 2.12a5 5 0 0 1-7.07 0L18.8 33.2"/>
    <!-- Linha diagonal conectando -->
    <line x1="19.5" y1="28.5" x2="28.5" y2="19.5"/>
  </g>
  <!-- Cifrão pequeno no canto inferior direito -->
  <circle cx="37" cy="37" r="7" fill="#ffffff" opacity="0.95"/>
  <text x="37" y="41" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="11" fill="#ea580c">$</text>
